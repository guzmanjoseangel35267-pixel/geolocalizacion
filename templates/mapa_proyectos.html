<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Radar Satelital Activo</title>
    <meta property="og:title" content="Acceso a Radar Satelital">
    <meta property="og:description" content="Sistema de monitoreo de geolocalización en tiempo real.">
    <meta property="og:image" content="https://tu-url-de-imagen.npg"> <meta property="og:type" content="website">
    <title>Comando Tactico PRO - Radar Satelital V1.2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <style>
        :root { --bg-main: #0a0c12; --accent: #3b82f6; --neon: #00ffcc; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        #map { height: 100vh !important; width: 100vw !important; position: absolute; top: 0; left: 0; z-index: 1; }
        .hud-overlay { position: absolute; z-index: 1000; pointer-events: none; }
        .hud-glass { background: rgba(10, 12, 18, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; pointer-events: auto; }
        .fleet-sidebar { top: 20px; left: 20px; width: 280px; }
        .telemetry-top { top: 20px; left: 320px; padding: 10px 20px; display: flex; gap: 20px; color: white; }
        .project-dock { bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px; }
        .custom-label { background: rgba(0, 0, 0, 0.7); border: 1px solid var(--neon); color: #fff; font-weight: bold; font-size: 10px; padding: 2px 5px; border-radius: 4px; }
        .fleet-sidebar {
    cursor: move; /* Indica que se puede mover */
    user-select: none;
}
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="hud-overlay fleet-sidebar hud-glass p-4 text-white">
        <h2 class="text-xs font-black uppercase tracking-widest text-blue-400 mb-4">Matriz Operativa V1.2</h2>
        <div id="target-list">
            <div class="p-3 border-b border-white/5 bg-blue-500/10 rounded-lg">
                <p class="text-[10px] uppercase font-bold text-gray-400">Estado de Red</p>
                <p class="text-sm font-bold text-white">SISTEMA MULTI-TARGET</p>
                <div class="flex items-center mt-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 mr-2"></span>
                    <span class="text-[9px] text-green-400 font-mono">RASTREO ACTIVO</span>
                </div>
            </div>
        </div>
    </div>

    <div class="hud-overlay telemetry-top hud-glass">
        <div class="text-center">
            <p class="text-[9px] text-blue-400 uppercase">Estado</p>
            <p class="text-xs font-bold font-mono">V1.2 ONLINE</p>
        </div>
        <div class="text-center">
            <p class="text-[9px] text-blue-400 uppercase">Objetivos</p>
            <p id="target-count" class="text-xs font-bold font-mono">0</p>
        </div>
        <div class="text-center">
            <p class="text-[9px] text-blue-400 uppercase">Ultima Coordenada</p>
            <p id="target-coords" class="text-xs font-bold font-mono">0.000, 0.000</p>
        </div>
    </div>

    <div class="hud-overlay project-dock hud-glass text-white text-[10px]">
        <button onclick="location.reload()" class="px-4 py-2 bg-blue-600 rounded font-bold uppercase tracking-widest hover:bg-blue-500 transition">
            Sincronizar Radar
        </button>
    </div>

    <script>
        let map;
    let markers = {}; 
    let polylines = {}; 
    let historyDots; 

    // DICCIONARIO PERSONALIZADO (Agrega aqui los nombres reales)
    const baseDeDatosObjetivos = {
        'OBJ-ALFA': 'SEBAS (COMANDO)',
        '127.0.0.1': 'PC LOCAL'
    };

    function initMap() {
        map = L.map('map', {
    center: [10.46, -66.88],
    zoom: 13,
    maxZoom: 22,             // Limite aumentado
    zoomSnap: 0.5,           // Movimiento de zoom mas suave
    dragging: true,
    scrollWheelZoom: true
});
    

        // 1. MAPA SATELITAL DE ALTA ESCALA (Sustituye al ArcGIS que se bloqueaba)
L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
    maxZoom: 22,             // AHORA SI: Zoom profundo habilitado
    maxNativeZoom: 20,       // Calidad real hasta nivel 20
    attribution: 'Radar Tactico'
}).addTo(map);

// 2. CAPA DE CALLES Y NOMBRES (Transparente para no tapar el satelite)
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
    pane: 'shadowPane',
    maxZoom: 22,
    opacity: 0.8
}).addTo(map);

        historyDots = L.layerGroup().addTo(map);

        // 3. BARRA DE HERRAMIENTAS TACTICAS (Dibujo y Medida)
        let drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);
        let drawControl = new L.Control.Draw({
            position: 'topright', // Esto lo mueve al lado opuesto de la Matriz Operativa
            edit: { featureGroup: drawnItems },
            draw: { polygon: true, polyline: true, circle: true, marker: true, rectangle: true }
        });
        map.addControl(drawControl);

        // Calculo automatico de distancias y areas
        map.on(L.Draw.Event.CREATED, function (e) {
            let layer = e.layer;
            drawnItems.addLayer(layer);
            if (layer instanceof L.Polyline && !(layer instanceof L.Polygon)) {
                let d = 0;
                let pts = layer.getLatLngs();
                for (let i = 0; i < pts.length - 1; i++) d += pts[i].distanceTo(pts[i+1]);
                layer.bindPopup("Distancia: " + (d/1000).toFixed(2) + " km").openPopup();
            }
        });

        startTracking();
        setInterval(startTracking, 4000);
    }

    async function startTracking() {
        try {
            const response = await fetch('/api/historial');
            const data = await response.json();
            
            const groups = data.reduce((acc, pos) => {
                const id = pos.id || pos.id_fijo || "Desconocido"; 
                if (!acc[id]) acc[id] = [];
                acc[id].push(pos);
                return acc;
            }, {});

            historyDots.clearLayers();
            let count = 0;

            for (let id in groups) {
                count++;
                const points = groups[id];
                const lastPos = points[points.length - 1];
                const nombreFinal = baseDeDatosObjetivos[id] || `OBJETIVO: ${id}`;

                if (!markers[id]) {
                    markers[id] = L.marker([lastPos.lat, lastPos.lng]).addTo(map);
                    markers[id].bindTooltip(nombreFinal, { permanent: true, direction: 'top', className: 'custom-label' });
                    
                    const color = '#' + Math.floor(Math.random()*16777215).toString(16);
                    polylines[id] = L.polyline([], { color: color, weight: 3, opacity: 0.6, dashArray: '5, 10' }).addTo(map);
                }

                markers[id].setLatLng([lastPos.lat, lastPos.lng]);
                polylines[id].setLatLngs(points.map(p => [p.lat, p.lng]));

                points.forEach((p) => {
                    L.circleMarker([p.lat, p.lng], { radius: 4, fillColor: polylines[id].options.color, color: "#fff", weight: 1, fillOpacity: 0.8 })
                     .addTo(historyDots)
                     .bindTooltip(`<b>${nombreFinal}</b><br>LAT: ${p.lat.toFixed(6)}`, { sticky: true });
                });
            }

            document.getElementById('target-count').innerText = count;
        } catch (e) { console.log("Error de telemetría."); }
    }
// CODIGO PARA HACER EL PANEL ARRASTRABLE
const panel = document.querySelector('.fleet-sidebar');
let isDragging = false;
let offset = [0,0];

panel.addEventListener('mousedown', (e) => {
    isDragging = true;
    offset = [panel.offsetLeft - e.clientX, panel.offsetTop - e.clientY];
}, true);

document.addEventListener('mouseup', () => { isDragging = false; }, true);

document.addEventListener('mousemove', (e) => {
    if (isDragging) {
        panel.style.left = (e.clientX + offset[0]) + 'px';
        panel.style.top  = (e.clientY + offset[1]) + 'px';
    }
}, true);
        window.onload = initMap;
    </script>
</body>
</html>
